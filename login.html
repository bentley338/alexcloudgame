"<!DOCTYPE html>
<html lang=\"id\">
<head>
  <meta charset=\"UTF-8\" />
  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />
  <title>Masuk — Alex Cloud Game</title>

  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\" />
  <link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin />
  <link href=\"https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap\" rel=\"stylesheet\" />
  <link rel=\"stylesheet\" href=\"https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css\" />
  <link rel=\"stylesheet\" href=\"style.css\" />
</head>
<body>
  <a href=\"index.html\" class=\"back-home\" data-testid=\"back-home-link\">
    <i class=\"fa-solid fa-arrow-left\"></i> Kembali
  </a>

  <main class=\"auth-wrap\">
    <div class=\"auth-bg-grid\"></div>

    <section class=\"auth-card\" data-testid=\"login-card\">
      <a href=\"index.html\" class=\"logo\">
        <span class=\"logo-dot\"></span>
        Alex<span class=\"logo-accent\">Cloud</span>
      </a>

      <h1>Selamat Datang Kembali</h1>
      <p class=\"muted\">Masuk ke akun Anda untuk mulai main game di cloud.</p>

      <div id=\"formMsg\"></div>

      <form id=\"loginForm\" novalidate>
        <div class=\"field\">
          <label for=\"email\">Email</label>
          <input type=\"email\" id=\"email\" name=\"email\" placeholder=\"nama@email.com\" autocomplete=\"email\" data-testid=\"login-email-input\" required />
        </div>
        <div class=\"field\">
          <label for=\"password\">Password</label>
          <input type=\"password\" id=\"password\" name=\"password\" placeholder=\"Minimal 6 karakter\" autocomplete=\"current-password\" data-testid=\"login-password-input\" required />
        </div>

        <button type=\"submit\" class=\"btn btn-primary btn-block\" data-testid=\"login-submit-btn\">
          <i class=\"fa-solid fa-right-to-bracket\"></i> Masuk
        </button>
      </form>

      <div class=\"auth-footer\">
        Belum punya akun?
        <a href=\"#\" id=\"toggleMode\" data-testid=\"toggle-register-link\">Daftar dulu</a>
      </div>
    </section>
  </main>

  <script src=\"script.js\"></script>
  <script>
    /* ==== Simple LocalStorage auth (no backend) ==== */
    const form = document.getElementById('loginForm');
    const msgBox = document.getElementById('formMsg');
    const toggle = document.getElementById('toggleMode');
    const title = document.querySelector('.auth-card h1');
    const subtitle = document.querySelector('.auth-card .muted');
    const submitBtn = form.querySelector('button[type=\"submit\"]');

    let mode = 'login'; // 'login' | 'register'

    function setMode(next) {
      mode = next;
      msgBox.innerHTML = '';
      if (mode === 'login') {
        title.textContent = 'Selamat Datang Kembali';
        subtitle.textContent = 'Masuk ke akun Anda untuk mulai main game di cloud.';
        submitBtn.innerHTML = '<i class=\"fa-solid fa-right-to-bracket\"></i> Masuk';
        toggle.textContent = 'Daftar dulu';
        toggle.previousSibling.textContent = 'Belum punya akun? ';
      } else {
        title.textContent = 'Buat Akun Baru';
        subtitle.textContent = 'Daftar untuk menyimpan sesi dan mengakses dashboard.';
        submitBtn.innerHTML = '<i class=\"fa-solid fa-user-plus\"></i> Daftar';
        toggle.textContent = 'Masuk saja';
        toggle.previousSibling.textContent = 'Sudah punya akun? ';
      }
    }

    toggle.addEventListener('click', (e) => {
      e.preventDefault();
      setMode(mode === 'login' ? 'register' : 'login');
    });

    function showMsg(text, type = 'error') {
      msgBox.innerHTML = `<div class=\"form-${type}\" data-testid=\"form-${type}\">${text}</div>`;
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      // Validation
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        return showMsg('Format email tidak valid.');
      }
      if (!password || password.length < 6) {
        return showMsg('Password minimal 6 karakter.');
      }

      const users = JSON.parse(localStorage.getItem('alex_users') || '{}');

      if (mode === 'register') {
        if (users[email]) return showMsg('Email sudah terdaftar. Silakan login.');
        users[email] = { password, createdAt: new Date().toISOString() };
        localStorage.setItem('alex_users', JSON.stringify(users));
        localStorage.setItem('alex_session', JSON.stringify({ email, loggedInAt: Date.now() }));
        showMsg('Akun berhasil dibuat! Mengarahkan ke dashboard…', 'success');
        setTimeout(() => (window.location.href = 'dashboard.html'), 900);
      } else {
        const user = users[email];
        if (!user || user.password !== password) {
          return showMsg('Email atau password salah.');
        }
        localStorage.setItem('alex_session', JSON.stringify({ email, loggedInAt: Date.now() }));
        showMsg('Login berhasil! Mengarahkan ke dashboard…', 'success');
        setTimeout(() => (window.location.href = 'dashboard.html'), 700);
      }
    });

    // Auto-redirect if already logged in
    (function checkSession() {
      const sess = localStorage.getItem('alex_session');
      if (sess) {
        try {
          const { email } = JSON.parse(sess);
          if (email) {
            showMsg(`Sudah login sebagai ${email}. Mengarahkan ke dashboard…`, 'success');
            setTimeout(() => (window.location.href = 'dashboard.html'), 500);
          }
        } catch (_) {}
      }
    })();
  </script>
</body>
</html>
"

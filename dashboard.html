<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Alex Cloud Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="background:#0a0a0a; color:#eee; padding:2rem;">
  <div class="container">
    <h1>Selamat Datang, <span id="userEmail"></span> 👾</h1>
    <p>Akun Anda aktif. Mulai main sekarang!</p>
    
    <div style="margin:3rem 0;">
      <a href="https://luna.amazon.com" target="_blank" class="btn-primary" style="display:inline-block; padding:16px 40px; font-size:1.2rem;">Mulai Main di Amazon Luna</a>
    </div>
    
    <button onclick="logout()" style="background:#ff4444; color:white; padding:12px 24px; border:none; border-radius:50px;">Logout</button>
  </div>

  <script>
    const email = localStorage.getItem('userEmail');
    if (!localStorage.getItem('isLoggedIn') || !email) {
      window.location.href = 'login.html';
    } else {
      document.getElementById('userEmail').textContent = email.split('@')[0];
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
